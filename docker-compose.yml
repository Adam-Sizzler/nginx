x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: always
  networks:
    - all-net

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  nginx:
    <<: [*common, *logging, *env]
    image: ghcr.io/adam-sizzler/nginx:latest
    container_name: nginx
    hostname: nginx
    # ports:
    #   - "36078:36078"
    volumes:
      - geoip_data:/etc/nginx/geolite2
      # Если вы захотите изменять конфиги без пересборки образа, 
      # можно раскомментировать строки ниже:
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./conf.d:/etc/nginx/conf.d:ro
      # - ./var/www:/var/www:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1:36078/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  all-net:
    name: all-net
    driver: bridge
    external: false

volumes:
  geoip_data:
    name: geoip_data
    driver: local
    external: false
