name: Build and Push Custom Nginx

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for Docker image, for example v1.2.3"
        required: true
        type: string
  push:
    tags:
      - "*"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/exodus-nginx:latest
            ghcr.io/${{ env.REPO_NAME }}/exodus-nginx:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max