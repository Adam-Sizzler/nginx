location ^~ /subscription/proto.NodeService/ {
  set $exodus_subscription_grpc exodus-subscription:2223;
  grpc_pass grpc://$exodus_subscription_grpc;
  grpc_set_header Host $host;
  grpc_set_header X-Real-IP $remote_addr;
  grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  grpc_set_header X-Forwarded-Proto https;
  grpc_read_timeout 3600s;
  grpc_send_timeout 3600s;
}

location ^~ /node/proto.NodeService/ {
  grpc_pass grpc://host.docker.internal:2222;
  grpc_set_header Host $host;
  grpc_set_header X-Real-IP $remote_addr;
  grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  grpc_set_header X-Forwarded-Proto https;
  grpc_read_timeout 3600s;
  grpc_send_timeout 3600s;
}

location ~ ^/subscription/.+ {
  proxy_http_version 1.1;
  set $exodus_subscription_http http://exodus-subscription:3010;
  proxy_pass $exodus_subscription_http;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
}

location /exodus_path/ {
  proxy_http_version 1.1;
  set $exodus_panel_http http://exodus:3000;
  proxy_pass $exodus_panel_http;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
}

location / {
  root /var/www/exodus;
  index index.html;
  add_header X-Client-IP $remote_addr always;
  add_header X-Client-Country $geoip2_country_name always;
  add_header X-Client-Country-Code $geoip2_country_code always;
  add_header Access-Control-Expose-Headers "X-Client-IP, X-Client-Country, X-Client-Country-Code" always;
  try_files $uri $uri/ /index.html;
}
